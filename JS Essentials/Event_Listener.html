<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event-01</title>
    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="p-3">
    <button onclick="f()" class="btn btn-secondary">Click Me</button>
    <button id="btn" class="btn btn-primary">Click Me</button>
    <button id="btn2" class="btn btn-primary">Click Me</button>
    <p id="para"></p>

    <script>
      const f = () => {
        alert("Button is Clicked! by User");
      };

      btn.addEventListener("mouseover", () => {
        document.getElementById("para").innerText = "Button was hovered!";
      });
      btn2.addEventListener("mouseenter", () => {
        document.getElementById("para").innerText = "Button was entered!";
      });
      btn2.addEventListener("click", (e) => {
        alert(e.type);
        alert(e.target.id);
        alert(e.target.innerText);
        document.getElementById("para").innerText = "Button was clicked!";
      });
    </script>
  </body>
</html>
