<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event-01</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>

  <body class="p-3">
    <form id="myForm">
      <input type="text" id="name" placeholder="Enter your name" class="mb-2 rounded" />
      <button type="submit" class="btn btn-secondary" onclick="f()">Submit</button>
      <p id="para"></p>
    </form>

  </body>
    <script>
      const form = document.getElementById("myForm");
      const input = document.getElementById("name");
      const para = document.getElementById("para");
      
      form.addEventListener("submit", (e) => {
        e.preventDefault();   //this will prevent the default behaviour of form submission which is to reload the page
        const userName = input.value;
        para.innerHTML = `${userName}!`;
      });

      // const f = () => {
      //   var data = input.value;
      //   para.innerText = `${data}!`;
      // }
    </script>
</html>
